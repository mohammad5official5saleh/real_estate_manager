{% extends "base.html" %}

{% block content %}
<h2>Add New Property</h2>

<form method="POST">
    <label>Property Name</label><br>
    <input type="text" name="title" required><br><br>

    <label>City / Location</label><br>
    <input type="text" name="location" required><br><br>

    <label>Property Type</label><br>
    <select name="property_type" required>
        <option>Apartment</option>
        <option>Villa</option>
        <option>Townhouse</option>
        <option>Penthouse</option>
        <option>Compound</option>
    </select><br><br>

    <label>Area</label><br>
    <input type="text" name="area" placeholder="Example: 120 sqm" required><br><br>

    <label>Bedrooms</label><br>
    <select name="bedrooms" required>
        <option>Studio</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6+</option>
    </select><br><br>

    <label>Bathrooms</label><br>
    <select name="bathrooms" required>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4+</option>
    </select><br><br>

    <label>Status</label><br>
    <select name="status" required>
        <option>Available</option>
        <option>Rent</option>
        <option>Sold</option>
    </select><br><br>

    <label>Price</label><br>
    <input type="number" name="price" required><br><br>

    <label>Contact Number</label><br>
    <input type="text" name="contact_phone" required><br><br>

    <label>Contact Email</label><br>
    <input type="email" name="contact_email" required><br><br>

    <button type="submit">Add Property</button>
</form>
{% endblock %}
