<!DOCTYPE html>
<html>
<head>
    <title>Real Estate Manager</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        a {
            text-decoration: none;
            color: #3498db;
            margin-right: 10px;
        }

        button {
            background-color: #3498db;
            color: white;
            padding: 8px 15px;
            border: none;
            cursor: pointer;
        }

        input, select {
            padding: 8px;
            width: 200px;
        }

        li {
            margin-bottom: 10px;
        }
    </style>

</head>
<body>

<header>
    <h1>Real Estate Listing System</h1>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
